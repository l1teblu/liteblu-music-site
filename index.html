<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                background-image: url("assets/background.jpg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
            }

            .logo-area {
                padding-top: 0px;
                text-align: center;
            }

            .logo {
                width: 400px;
                height: auto;
            }

            .navigation-buttons {
                display: flex;
                justify-content: center;
                gap: 5px;
                flex-wrap: nowrap;
                margin-top: 10px;
            }

            .image-button {
                display: block;
                width: 200px;
                height: 100px;
                background-size: contain;
                background-repeat: no-repeat;
                background-position: center;
            }

            .home-button {
                background-image: url("assets/home-button.png");
            }

            .home-button:hover {
                background-image: url("assets/home-button-hover.png");
            }

            .music-button {
                background-image: url("assets/music-button.png");
            }

            .music-button:hover {
                background-image: url("assets/music-button-hover.png");
            }

            .video-button {
                background-image: url("assets/video-button.png");
            }

            .video-button:hover {
                background-image: url("assets/video-button-hover.png");
            }

            .contact-button {
                background-image: url("assets/contact-button.png");
            }

            .contact-button:hover {
                background-image: url("assets/contact-button-hover.png");
            }

            .support-button {
                background-image: url("assets/support-button.png");
            }

            .support-button:hover {
                background-image: url("assets/support-button-hover.png");
            }
        </style>
    </head>

    <body>
        <div class="logo-area">
            <img src="assets/logo.png" alt="Liteblu logo" class="logo">
        </div>
        <div class="navigation-buttons">
            <a href="index.html" class="image-button home-button" aria-label="Home"></a>
            <a href="music.html" class="image-button music-button" aria-label="Music"></a>
            <a href="videos.html" class="image-button video-button" aria-label="Videos"></a>
            <a href="contact.html" class="image-button contact-button" aria-label="Contact"></a>
            <a href="support.html" class="image-button support-button" aria-label="Support"></a>
        </div>
    </body>
</html>
