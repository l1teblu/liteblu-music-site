<!DOCTYPE html>
<html>
    <head>
        <title>Welcome to Liteblu Music!</title>
        <link rel="icon" href="assets/favicon.png">

        <style>
            body {
                background-image: url("assets/background.jpg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
                overflow-x: hidden;
            }

            body::after {
                content:
                    url("assets/home-button-hover.png")
                    url("assets/music-button-hover.png")
                    url("assets/video-button-hover.png")
                    url("assets/contact-button-hover.png")
                    url("assets/support-button-hover.png");
                display: none;
            }

            .logo-area {
                padding-top: 0px;
                text-align: center;
            }

            .logo {
                width: 400px;
                height: auto;
            }

            .navigation-buttons {
                display: flex;
                justify-content: center;
                gap: 5px;
                flex-wrap: nowrap;
                margin-top: 10px;
            }

            .image-button {
                display: block;
                width: 200px;
                height: 100px;
                background-size: contain;
                background-repeat: no-repeat;
                background-position: center;
            }

            .home-button {
                background-image: url("assets/home-button.png");
            }

            .home-button:hover {
                background-image: url("assets/home-button-hover.png");
            }

            .music-button {
                background-image: url("assets/music-button.png");
            }

            .music-button:hover {
                background-image: url("assets/music-button-hover.png");
            }

            .video-button {
                background-image: url("assets/video-button.png");
            }

            .video-button:hover {
                background-image: url("assets/video-button-hover.png");
            }

            .contact-button {
                background-image: url("assets/contact-button.png");
            }

            .contact-button:hover {
                background-image: url("assets/contact-button-hover.png");
            }

            .support-button {
                background-image: url("assets/support-button.png");
            }

            .support-button:hover {
                background-image: url("assets/support-button-hover.png");
            }

            .body-frame {
                position: relative;
                width: min(900px, 95vw);
                aspect-ratio: 9 / 11;
                margin: 20px auto;
                box-sizing: border-box;

                background-image: url("assets/body-frame.png");
                background-size: contain;
                background-repeat: no-repeat;
                background-position: center;

                color: black;
                font-family: 
            }

            .body-text {
                position: absolute;
                top: 20%;
                left: 20%;
                right: 14%;
                bottom: 12%;
                box-sizing: border-box;
            }

            .body-text h1 {
                font-size: clamp(24px, 4vw, 40px);
                margin-top: 0;
            }

            .body-text p {
                font-size: clamp(14px, 2vw, 20px);
                line-height: 1.4;
            }
        </style>
    </head>

    <body>
        <div class="logo-area">
            <img src="assets/logo.png" alt="Liteblu logo" class="logo">
        </div>
        <div class="navigation-buttons">
            <a href="index.html" class="image-button home-button" aria-label="Home"></a>
            <a href="music.html" class="image-button music-button" aria-label="Music"></a>
            <a href="videos.html" class="image-button video-button" aria-label="Videos"></a>
            <a href="contact.html" class="image-button contact-button" aria-label="Contact"></a>
            <a href="support.html" class="image-button support-button" aria-label="Support"></a>
        </div>
        <div class="body-frame">
            <div class="body-text">
                <h1>Welcome</h1>

                <p>
                    This is where your page text will go.
                </p>
            </div>
        </div>
    </body>
</html>
